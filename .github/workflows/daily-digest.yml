name: Daily AI Agent Digest

on:
  # Every day at 19:00 UTC = 12:00 PT (PDT, summer time)
  # During PST (winter), this runs at 11:00 PT instead
  schedule:
    - cron: "0 19 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          FILE="digests/${DATE}.md"

          if [ -f "$FILE" ]; then
            git add "$FILE"
            # Only commit if there are staged changes
            if ! git diff --cached --quiet; then
              git commit -m "Add digest for ${DATE}"
              git push
            else
              echo "No changes to commit"
            fi
          else
            echo "Expected digest file not found: $FILE"
            exit 1
          fi
